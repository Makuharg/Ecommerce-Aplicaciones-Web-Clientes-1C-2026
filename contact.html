<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - TechZone</title>
    <meta name="description" content="Contactate con TechZone, tu tienda de tecnología.">
<script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
    <header>
        <a href="index.html">
            <h1>TechZone</h1>
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="contact.html" aria-current="page">Contacto</a></li>
            </ul>
        </nav>

        <div class="header-acciones">

            <input type="search" id="buscador" name="buscador" placeholder="Buscar productos...">

            <div class="usuario">
                <button type="button" id="btn-usuario" aria-label="Cuenta de usuario">
                    <i data-lucide="user"></i>
                </button>
                <div class="usuario-menu">
                    <a href="login.html">Iniciar sesión</a>
                    <a href="register.html">Registrarse</a>
                </div>
            </div>

            <a href="cart.html" aria-label="Ver carrito de compras">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count">0</span>
            </a>
        </div>
    </header>
    <main class="contact-section">
        <div class="contact-card">
            <h2>Contacto</h2>
            <form action="#" method="post">
                <div>
                    <label for="nombre">Nombre:</label><br>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan"><br><br>
                </div>
                <div>
                    <label for="apellido">Apellido:</label><br>
                    <input type="text" id="apellido" name="apellido" required placeholder="Ej: Pérez"><br><br>
                </div>
                <div>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" required placeholder="Ej: juan@correo.com"><br><br>
                </div>
                <div class="asunto-mensaje">
                    <label for="asunto">Asunto</label>
                    <select id="asunto" name="asunto" required>
                        <option value="">Seleccioná un motivo</option>
                        <option value="consulta">Consulta de producto</option>
                        <option value="envio">Consulta de envío</option>
                        <option value="cambio">Cambio o devolución</option>
                        <option value="garantia">Garantía</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
                <div class="asunto-mensaje">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Ej: Hola, quiero contactarme con ustedes..."></textarea>
                </div>
                <button type="submit">Enviar</button>
            </form>
        </div>
        <footer>
            <p>© 2026 TechZone - Tienda de Tecnología</p>
            <address>Email: contacto@techzone.com | Tel: 0800-123-4567</address>
        </footer>
    </main>
<script>lucide.createIcons();</script>
</body>
</html>
